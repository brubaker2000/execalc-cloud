name: Smoke - Integrations Gates

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Do not run on pull requests from forks (prevents external abuse against your Cloud Run URL).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables
        env:
          BASE_URL: ${{ vars.EXECALC_SERVICE_URL }}
          TENANT_ID: ${{ vars.EXECALC_SMOKE_TENANT_ID }}
          ROLE: ${{ vars.EXECALC_SMOKE_ROLE }}
          SMOKE_KEY: ${{ secrets.EXECALC_SMOKE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_URL:-}" ]; then echo "Missing repo variable: EXECALC_SERVICE_URL"; exit 1; fi
          if [ -z "${TENANT_ID:-}" ]; then echo "Missing repo variable: EXECALC_SMOKE_TENANT_ID"; exit 1; fi
          if [ -z "${ROLE:-}" ]; then echo "Missing repo variable: EXECALC_SMOKE_ROLE"; exit 1; fi
          if [ -z "${SMOKE_KEY:-}" ]; then echo "Missing repo secret: EXECALC_SMOKE_KEY"; exit 1; fi
          echo "Smoke vars present."

      - name: Run integrations smoke test (Cloud Run)
        env:
          BASE_URL: ${{ vars.EXECALC_SERVICE_URL }}
          TENANT_ID: ${{ vars.EXECALC_SMOKE_TENANT_ID }}
          ROLE: ${{ vars.EXECALC_SMOKE_ROLE }}
          SMOKE_KEY: ${{ secrets.EXECALC_SMOKE_KEY }}
        run: |
          chmod +x scripts/smoke_integrations.sh
          ./scripts/smoke_integrations.sh
